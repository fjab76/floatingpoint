{% extends "base.html" %}
{% block title %}Notes{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
<style>
.notes-body {
    max-width: 680px;
    margin: 0 auto;
    font-size: 17px;
    line-height: 1.75;
    color: #333;
}
.notes-body h1 {
    text-align: left;
}
.notes-body h2 {
    border-left: 4px solid #2e7d32;
    padding-left: 12px;
    color: #1b5e20;
    margin-top: 2em;
}
.notes-body h3 {
    border-left: 3px solid #4CAF50;
    padding-left: 10px;
    color: #2e7d32;
    margin-top: 1.5em;
}
.notes-body h4 {
    color: #333;
    margin-top: 1.25em;
}
.notes-body pre {
    background: #1e1e1e;
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;
}
.notes-body code:not(.hljs) {
    background: #e9ecef;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 15px;
    font-family: 'Courier New', monospace;
}
.notes-body blockquote {
    border-left: 4px solid #ddd;
    margin: 0;
    padding-left: 16px;
    color: #666;
}
.notes-body table {
    border-collapse: collapse;
    width: 100%;
    margin: 16px 0;
    font-size: 15px;
}
.notes-body th,
.notes-body td {
    border: 1px solid #ddd;
    padding: 8px 12px;
    text-align: left;
}
.notes-body th {
    background: #f5f5f5;
    font-weight: bold;
}
.notes-body .katex-display {
    overflow-x: auto;
    padding: 8px 0;
    margin: 1em 0;
}
#notes-loading {
    color: #666;
    text-align: center;
    padding: 40px 0;
}
</style>
{% endblock %}

{% block content %}
<div class="notes-body">
    <div id="notes-loading">Loading…</div>
    <div id="notes-content"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
<script>
  (async () => {
    const loading = document.getElementById('notes-loading');
    const content = document.getElementById('notes-content');
    try {
      const res = await fetch('/notes/content');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();

      // Extract math before marked so inline markers (_,*) inside $…$ are not
      // treated as emphasis. Replace with placeholder tokens, restore after parse.
      const mathStore = [];
      const ph = (i) => `\u0002MATH${i}\u0003`;
      let src = text;
      src = src.replace(/\$\$([\s\S]*?)\$\$/g, (_, math) => {
        mathStore.push({ display: true, math });
        return ph(mathStore.length - 1);
      });
      src = src.replace(/\$([^\$\n]+?)\$/g, (_, math) => {
        mathStore.push({ display: false, math });
        return ph(mathStore.length - 1);
      });

      let html = marked.parse(src);

      // Render math placeholders with KaTeX
      html = html.replace(/\u0002MATH(\d+)\u0003/g, (_, i) => {
        const { display, math } = mathStore[+i];
        return katex.renderToString(math.trim(), { displayMode: display, throwOnError: false });
      });

      content.innerHTML = DOMPurify.sanitize(html);
      content.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
        h.id = h.textContent.toLowerCase().replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-');
      });
      content.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
      if (location.hash) {
        const target = document.querySelector(location.hash);
        if (target) target.scrollIntoView();
      }
    } catch (err) {
      const p = document.createElement('p');
      p.style.color = '#721c24';
      p.textContent = `Failed to load notes: ${err.message}`;
      content.appendChild(p);
    } finally {
      loading.style.display = 'none';
    }
  })();
</script>
{% endblock %}
